<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskPlanner — Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">

  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="auth-brand-icon"><i class="fas fa-graduation-cap"></i></div>
        <h1>TaskPlanner</h1>
        <p>Organize your studies, ace your goals</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
        <button class="auth-tab" id="tabReg" onclick="switchTab('register')">Sign Up</button>
      </div>

      <!-- Error -->
      <div class="auth-err" id="authErr"></div>

      <!-- Login -->
      <form class="auth-form" id="loginForm">
        <div class="field">
          <i class="fas fa-user"></i>
          <input type="text" id="lUser" placeholder="Username" autocomplete="username" required>
        </div>
        <div class="field">
          <i class="fas fa-lock"></i>
          <input type="password" id="lPass" placeholder="Password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="auth-btn">
          Sign In <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <!-- Register -->
      <form class="auth-form hidden" id="regForm">
        <div class="field">
          <i class="fas fa-user"></i>
          <input type="text" id="rUser" placeholder="Username" autocomplete="username" required>
        </div>
        <div class="field">
          <i class="fas fa-envelope"></i>
          <input type="email" id="rEmail" placeholder="Email address" autocomplete="email" required>
        </div>
        <div class="field">
          <i class="fas fa-lock"></i>
          <input type="password" id="rPass" placeholder="Password (min 6 chars)" autocomplete="new-password" required>
        </div>
        <button type="submit" class="auth-btn">
          Create Account <i class="fas fa-arrow-right"></i>
        </button>
      </form>

    </div>
  </div>

  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
