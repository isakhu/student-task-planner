<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Planner</title>
    
    <!-- Link to our CSS file -->
    <!-- Flask serves static files from the 'static' folder -->
    <!-- url_for() generates the correct URL for static files -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Main container for the entire app -->
    <div class="container">
        
        <!-- Header section with title and dark mode toggle -->
        <header>
            <h1><i class="fas fa-graduation-cap"></i> Student Task Planner</h1>
            <button id="darkModeToggle" class="dark-mode-btn">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- Dashboard showing task statistics -->
        <div class="dashboard">
            <div class="stat-card">
                <i class="fas fa-tasks"></i>
                <div>
                    <h3 id="totalTasks">0</h3>
                    <p>Total Tasks</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div>
                    <h3 id="completedTasks">0</h3>
                    <p>Completed</p>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div>
                    <h3 id="pendingTasks">0</h3>
                    <p>Pending</p>
                </div>
            </div>
        </div>

        <!-- Form to add new tasks -->
        <div class="add-task-section">
            <h2>Add New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">
                        <i class="fas fa-pencil-alt"></i> Task Title
                    </label>
                    <input 
                        type="text" 
                        id="taskTitle" 
                        placeholder="Enter your task..." 
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="taskDeadline">
                        <i class="fas fa-calendar-alt"></i> Deadline
                    </label>
                    <input 
                        type="date" 
                        id="taskDeadline" 
                        required
                    >
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Task
                </button>
            </form>
        </div>

        <!-- Section to display all tasks -->
        <div class="tasks-section">
            <h2>My Tasks</h2>
            <div id="tasksList" class="tasks-list">
                <!-- Tasks will be dynamically added here by JavaScript -->
            </div>
            <div id="emptyState" class="empty-state">
                <i class="fas fa-clipboard-list"></i>
                <p>No tasks yet. Add your first task above!</p>
            </div>
        </div>
    </div>

    <!-- Link to our JavaScript file -->
    <!-- This must be at the end so the HTML loads first -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
