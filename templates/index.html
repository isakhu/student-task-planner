<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskPlanner</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">

    <div class="sb-brand">
      <div class="sb-brand-icon"><i class="fas fa-graduation-cap"></i></div>
      <span>TaskPlanner</span>
    </div>

    <div class="sb-section">
      <p class="sb-label">Menu</p>
      <button class="sb-item active" data-filter="" onclick="setFilter(this,'')">
        <i class="fas fa-home"></i> All Tasks
        <span class="sb-count" id="cnt-all">0</span>
      </button>
      <button class="sb-item" data-filter="status=pending" onclick="setFilter(this,'status=pending')">
        <i class="fas fa-hourglass-half"></i> Pending
        <span class="sb-count" id="cnt-pending">0</span>
      </button>
      <button class="sb-item" data-filter="status=completed" onclick="setFilter(this,'status=completed')">
        <i class="fas fa-check-circle"></i> Completed
        <span class="sb-count" id="cnt-done">0</span>
      </button>
      <button class="sb-item" data-filter="priority=High" onclick="setFilter(this,'priority=High')">
        <i class="fas fa-fire"></i> High Priority
      </button>
      <button class="sb-item" data-filter="status=overdue" onclick="setFilter(this,'status=overdue')">
        <i class="fas fa-exclamation-circle"></i> Overdue
        <span class="sb-count" id="cnt-overdue">0</span>
      </button>
    </div>

    <div class="sb-section" id="sbCats">
      <p class="sb-label">Categories</p>
      <!-- filled by JS -->
    </div>

    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar" id="sbAvatar">U</div>
        <span class="sb-username" id="sbName">User</span>
        <button class="sb-logout" id="logoutBtn" title="Sign out">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>

  </aside>

  <!-- ── Main ────────────────────────────────────────── -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="topbar-menu icon-btn" id="menuBtn">
        <i class="fas fa-bars"></i>
      </button>

      <div class="search">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search tasks…">
      </div>

      <div class="topbar-right">
        <button class="icon-btn" id="darkBtn" title="Toggle theme">
          <i class="fas fa-moon"></i>
        </button>
        <button class="new-btn" id="openModal">
          <i class="fas fa-plus"></i>
          <span class="btn-label">New Task</span>
        </button>
      </div>
    </header>

    <!-- Page -->
    <div class="page">

      <!-- Header -->
      <div class="page-header">
        <h2 id="pageTitle">All Tasks</h2>
        <p id="pageSubtitle">Manage and track your study tasks</p>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-top">
            <div class="stat-icon"><i class="fas fa-layer-group"></i></div>
            <span class="stat-trend">Total</span>
          </div>
          <div class="stat-val" id="sTotal">0</div>
          <div class="stat-label">All Tasks</div>
        </div>
        <div class="stat">
          <div class="stat-top">
            <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
            <span class="stat-trend">Done</span>
          </div>
          <div class="stat-val" id="sDone">0</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat">
          <div class="stat-top">
            <div class="stat-icon"><i class="fas fa-clock"></i></div>
            <span class="stat-trend">Active</span>
          </div>
          <div class="stat-val" id="sPending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat">
          <div class="stat-top">
            <div class="stat-icon"><i class="fas fa-bolt"></i></div>
            <span class="stat-trend">Late</span>
          </div>
          <div class="stat-val" id="sOverdue">0</div>
          <div class="stat-label">Overdue</div>
        </div>
      </div>

      <!-- Progress -->
      <div class="progress-grid" id="progressGrid"></div>

      <!-- Toolbar -->
      <div class="toolbar">
        <select class="filter-select" id="fPriority">
          <option value="">All Priorities</option>
          <option value="High">🔴 High</option>
          <option value="Medium">🟡 Medium</option>
          <option value="Low">🟢 Low</option>
        </select>
        <select class="filter-select" id="fCategory">
          <option value="">All Categories</option>
          <option>General</option><option>Math</option><option>Science</option>
          <option>English</option><option>History</option><option>Project</option>
          <option>Exam</option><option>Assignment</option>
        </select>
        <span class="task-count-badge" id="taskCountBadge">0 tasks</span>
      </div>

      <!-- Tasks -->
      <div class="task-list" id="taskList"></div>

      <!-- Empty -->
      <div class="empty" id="emptyState">
        <div class="empty-icon"><i class="fas fa-inbox"></i></div>
        <h3>No tasks here</h3>
        <p>Hit "New Task" to add your first one!</p>
      </div>

    </div><!-- /page -->
  </div><!-- /main -->
</div><!-- /layout -->

<!-- ── Modal ──────────────────────────────────────────── -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h2><i class="fas fa-plus-circle"></i> New Task</h2>
      <button class="modal-x" id="closeModal"><i class="fas fa-times"></i></button>
    </div>
    <form class="modal-form" id="taskForm">
      <div class="fg">
        <label>Task Title</label>
        <input type="text" id="tTitle" placeholder="e.g. Study for Math exam" required>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Deadline</label>
          <input type="date" id="tDeadline" required>
        </div>
        <div class="fg">
          <label>Priority</label>
          <select id="tPriority">
            <option value="High">🔴 High</option>
            <option value="Medium" selected>🟡 Medium</option>
            <option value="Low">🟢 Low</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label>Category</label>
        <select id="tCategory">
          <option>General</option><option>Math</option><option>Science</option>
          <option>English</option><option>History</option><option>Project</option>
          <option>Exam</option><option>Assignment</option>
        </select>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn-ghost" id="cancelModal">Cancel</button>
        <button type="submit" class="btn-solid">
          <i class="fas fa-plus"></i> Add Task
        </button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
